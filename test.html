<!-- Главное всплывающее окно календаря -->
<dialog class="calendar-modal">
    
    <!-- ВЕРХНЯЯ ЧАСТЬ МОДАЛКИ -->
    <div class="calendar-modal__header">
        
        <!-- Левый блок: Текст, который меняется через JS -->
        <div class="calendar-modal__info">
            <h4 class="calendar-modal__duration">5 ночей</h4>
            <span class="calendar-modal__period-dates">18 мая 2026 г. – 23 мая 2026 г.</span>
        </div>

        <!-- Правый блок: Инпуты с лейблами и кнопками очистки -->
        <div class="calendar-modal__inputs-group">
            
            <!-- Инпут Прибытие -->
            <div class="calendar-modal__input-wrapper calendar-modal__input-wrapper--active">
                <label class="calendar-modal__label" for="cal-arrival">ПРИБЫТИЕ</label>
                <div class="calendar-modal__field-container">
                    <input class="calendar-modal__input" id="cal-arrival" type="text" value="18.05.2026" placeholder="DD.MM.YYYY">
                    <button type="button" class="calendar-modal__clear-btn" aria-label="Очистить дату">&times;</button>
                </div>
            </div>

            <!-- Инпут Выезд -->
            <div class="calendar-modal__input-wrapper">
                <label class="calendar-modal__label" for="cal-departure">ВЫЕЗД</label>
                <div class="calendar-modal__field-container">
                    <input class="calendar-modal__input" id="cal-departure" type="text" value="23.05.2026" placeholder="Укажите дату">
                    <button type="button" class="calendar-modal__clear-btn" aria-label="Очистить дату">&times;</button>
                </div>
            </div>

        </div>
    </div>

    <!-- СРЕДНЯЯ ЧАСТЬ: ОДИН ОБЩИЙ ДИВ ДЛЯ БЛОКА С КАЛЕНДАРЕМ -->
    <div class="calendar-modal__body">
        <div class="calendar-modal__months-layout">

            <!-- ДВА РАЗНЫХ ДИВА С КУЧЕЙ КНОПОКвнутри -->
            
            <!-- МЕСЯЦ 1: МАЙ -->
            <div class="calendar-month">
                <h5 class="calendar-month__title">Май 2026</h5>
                <div class="calendar-month__weeks-header">
                    <span>П</span><span>В</span><span>С</span><span>Ч</span><span>П</span><span>С</span><span>В</span>
                </div>
                <!-- Куча кнопок-чисел -->
                <div class="calendar-month__days-grid">
                    <!-- Неактивные прошлые дни -->
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>1</button>
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>2</button>
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>3</button>
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>4</button>
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>5</button>
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>6</button>
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>7</button>
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>8</button>
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>9</button>
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>10</button>
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>11</button>
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>12</button>
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>13</button>
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>14</button>
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>15</button>
                    <button type="button" class="calendar-month__day calendar-month__day--disabled" disabled>16</button>

                    <!-- ...пропущенные кнопки чисел... -->
                    
                    <!-- Выбранный день (старт диапазона) -->
                    <button type="button" class="calendar-month__day calendar-month__day--selected-start">18</button>
                    
                    <!-- Дни внутри диапазона (с серой подложкой) -->
                    <button type="button" class="calendar-month__day calendar-month__day--in-range">19</button>
                    <button type="button" class="calendar-month__day calendar-month__day--in-range">20</button>
                    <button type="button" class="calendar-month__day calendar-month__day--in-range">21</button>
                    <button type="button" class="calendar-month__day calendar-month__day--in-range">22</button>
                    <button type="button" class="calendar-month__day calendar-month__day--in-range">23</button>
                    <button type="button" class="calendar-month__day calendar-month__day--in-range">24</button>
                    
                    
                    <!-- Выбранный день (конец диапазона) -->
                    <button type="button" class="calendar-month__day calendar-month__day--selected-end">25</button>
                    
                    <!-- Обычные доступные дни -->
                    <button type="button" class="calendar-month__day">26</button>
                    <button type="button" class="calendar-month__day">27</button>
                    <button type="button" class="calendar-month__day">28</button>
                    <button type="button" class="calendar-month__day">29</button>
                    <button type="button" class="calendar-month__day">30</button>
                    <button type="button" class="calendar-month__day">31</button>
                </div>
            </div>

            
            <div class="calendar-month">
                <h5 class="calendar-month__title">Июнь 2026</h5>
                <div class="calendar-month__weeks-header">
                    <span>П</span><span>В</span><span>С</span><span>Ч</span><span>П</span><span>С</span><span>В</span>
                </div>
                <div class="calendar-month__days-grid">
                    <button type="button" class="calendar-month__day">1</button>
                    <button type="button" class="calendar-month__day">2</button>
                    <button type="button" class="calendar-month__day">3</button>
                    <button type="button" class="calendar-month__day">4</button>
                    <button type="button" class="calendar-month__day">5</button>
                    <button type="button" class="calendar-month__day">6</button>
                    <button type="button" class="calendar-month__day">7</button>
                    <button type="button" class="calendar-month__day">8</button>
                    <button type="button" class="calendar-month__day">9</button>
                    <button type="button" class="calendar-month__day">10</button>
                    <button type="button" class="calendar-month__day">11</button>
                    <button type="button" class="calendar-month__day">12</button>
                    <button type="button" class="calendar-month__day">13</button>
                    <button type="button" class="calendar-month__day">14</button>
                    <button type="button" class="calendar-month__day">15</button>
                    <button type="button" class="calendar-month__day">16</button>
                    <button type="button" class="calendar-month__day">17</button>
                    <button type="button" class="calendar-month__day">18</button>
                    <button type="button" class="calendar-month__day">19</button>
                    <button type="button" class="calendar-month__day">20</button>
                    <button type="button" class="calendar-month__day">21</button>
                    <button type="button" class="calendar-month__day">22</button>
                    <button type="button" class="calendar-month__day">23</button>
                    <button type="button" class="calendar-month__day">24</button>
                    <button type="button" class="calendar-month__day">25</button>
                    <button type="button" class="calendar-month__day">26</button>
                    <button type="button" class="calendar-month__day">27</button>
                    <button type="button" class="calendar-month__day">28</button>
                    <button type="button" class="calendar-month__day">29</button>
                    <button type="button" class="calendar-month__day">30</button>
                </div>
            </div>

        </div>
    </div>

    <!-- НИЖНЯЯ ЧАСТЬ МОДАЛКИ (Подвал с управлением) -->
    <div class="calendar-modal__footer">
        <button type="button" class="calendar-modal__keyboard-trigger" aria-label="Открыть клавиатуру">⌨️</button>
        <div class="calendar-modal__footer-actions">
            <button type="button" class="calendar-modal__btn-reset">Сбросить даты</button>
            <button type="button" class="calendar-modal__btn-close">Закрыть</button>
        </div>
    </div>

</dialog>
